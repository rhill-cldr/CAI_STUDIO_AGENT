[book]
title = "Agent Studio Developer's Guide"
authors = ["Ryan Hill"]
language = "en"
description = "Architecture reference and template packaging specifications for building Agent Studio harnesses and validation SDKs"

[preprocessor.d2]
path = "d2"
layout = "elk"
inline = false
output-dir = "d2"

# katex preprocessor disabled (0.9.4 incompatible with mdbook 0.5.2).
# Using MathJax 3 via client-side JS instead — see theme/mathjax.js

[output.html]
default-theme = "light"
additional-css = ["theme/custom.css"]
additional-js = ["theme/diagrams.js", "theme/mathjax.js"]

[output.html.print]
enable = true
